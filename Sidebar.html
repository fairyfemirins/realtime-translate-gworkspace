<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; padding: 10px; }
      select, button { width: 100%; padding: 8px; margin: 5px 0; }
      #result { margin-top: 10px; padding: 8px; border: 1px solid #ddd; min-height: 50px; }
    </style>
  </head>
  <body>
    <h3>RealTimeTranslate</h3>
    <div>
      <label for="sourceLang">Source Language:</label>
      <select id="sourceLang">
        <option value="auto">Auto Detect</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
      </select>
    </div>
    <div>
      <label for="targetLang">Target Language:</label>
      <select id="targetLang">
        <option value="es">Spanish</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
      </select>
    </div>
    <button onclick="translate()">Translate</button>
    <div id="result"></div>

    <script>
      function translate() {
        const sourceLang = document.getElementById("sourceLang").value;
        const targetLang = document.getElementById("targetLang").value;
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "Translating...";

        google.script.run
          .withSuccessHandler(text => {
            resultDiv.innerHTML = text;
          })
          .withFailureHandler(error => {
            resultDiv.innerHTML = "Error: " + error.message;
          })
          .translateSelection(sourceLang, targetLang);
      }
    </script>
  </body>
</html>
